<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>犬心治 - 網站介紹</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent-blue: #1275ff;
            --accent-orange: #ff8d30;
            --text-muted: #475569;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: #f7f4ed;
            font-family: 'Inter', "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 120px 20px 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111111;
            overflow-x: hidden;
            position: relative;
        }

        nav { position: fixed; top: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-container { width: 100%; padding: 1.2rem 6vw; display: flex; justify-content: space-between; align-items: center; max-width: 1600px; margin: 0 auto; box-sizing: border-box; }
        .logo { font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, var(--accent-blue), var(--accent-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .nav-links { display: flex; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-muted); margin-left: 2.5rem; font-size: 1.05rem; font-weight: 600; transition: var(--transition); }
        .nav-links a:hover { color: var(--accent-blue); }
        .mobile-menu-btn { display: none; background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }

        .back-btn { position: absolute; top: 100px; left: 40px; text-decoration: none; color: #333333; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; background-color: #ffffff; padding: 10px 22px; border-radius: 50px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); transition: all 0.3s ease; z-index: 100; border: 1px solid #eeeeee; }
        .back-btn:hover { transform: translateX(-5px); color: #f0895d; }

        .container { max-width: 900px; width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
        h1.site-title { text-align: center; color: #f29468; font-size: 5rem; font-weight: 900; margin-top: 0; margin-bottom: 60px; letter-spacing: 5px; }

        .collage-wrapper { position: relative; width: 100%; margin-bottom: 50px; display: flex; flex-direction: column; }
        .collage-wrapper img { background-color: #ffffff; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.12); transition: all 0.3s; position: relative; cursor: pointer; }
        .collage-wrapper img:hover { transform: translateY(-8px) scale(1.02); z-index: 50; }
        .border-dashed { border: 5px dashed #f09e60; border-radius: 12px; }
        .border-solid { border: 5px solid #e89528; border-radius: 8px; }

        .g1-img-qna { width: 60%; align-self: flex-end; margin-right: 5%; z-index: 1; aspect-ratio: 16 / 9; }
        .g1-img-dog { width: 70%; align-self: flex-start; z-index: 2; margin-top: -22%; margin-left: 2%; aspect-ratio: 16 / 9; }
        .g2-img-letter { width: 70%; align-self: center; z-index: 1; aspect-ratio: 4 / 3; }
        .g2-bottom-row { display: flex; justify-content: space-between; width: 90%; align-self: center; margin-top: -15%; z-index: 2; }
        .g2-img-goal { width: 35%; aspect-ratio: 1 / 1; margin-top: 5%; }
        .g2-img-btn { width: 40%; aspect-ratio: 4 / 3; }

        .text-block { font-size: 1.1rem; line-height: 2; text-align: justify; text-align-last: center; margin-bottom: 80px; padding: 0 20px; font-weight: 700; color: #222222; width: 90%; }

        /* 內嵌預覽區 */
        .iframe-section { width: 100%; max-width: 900px; margin-top: 20px; }
        .desktop-mockup { width: 100%; background: #ffffff; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e0e0e0; }
        .mockup-header { background-color: #f1f5f9; padding: 12px 16px; display: flex; gap: 8px; border-bottom: 1px solid #e2e8f0; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background-color: #ff5f56; } .yellow { background-color: #ffbd2e; } .green { background-color: #27c93f; }
        .desktop-mockup iframe { width: 100%; height: 600px; display: block; border: none; }
        .mobile-mockup { width: 320px; height: 650px; margin: 0 auto; background: #ffffff; border-radius: 40px; border: 14px solid #1f2937; position: relative; overflow: hidden; display: none; }
        .mobile-mockup iframe { width: 100%; height: 100%; display: block; border: none; }

        .img-modal { display: flex; visibility: hidden; opacity: 0; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .img-modal.show { visibility: visible; opacity: 1; }
        .img-modal-content { max-width: 90%; max-height: 90vh; border-radius: 8px; }
        .close-img-modal { position: absolute; top: 25px; right: 40px; color: #fff; font-size: 40px; cursor: pointer; }

        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; }
            .desktop-mockup { display: none; }
            .mobile-mockup { display: block; width: 95%; height: 500px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Portfolio</a>
            <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fa-solid fa-bars"></i></button>
            <div class="nav-links" id="navLinks">
                <a href="index.html#about">關於我</a>
                <a href="index.html#game">遊戲設計</a>
                <a href="index.html#web">網頁設計</a>
                <a href="index.html#uiux">UI/UX 設計</a>
            </div>
        </div>
    </nav>

    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> 返回主頁</a>

    <div class="container">
        <h1 class="site-title">犬心治</h1>

        <div class="collage-wrapper">
            <img class="g1-img-qna border-dashed" src="./pict/care1.png" alt="Q&A">
            <img class="g1-img-dog border-dashed" src="./pict/care2.png" alt="Dog Story">
        </div>
        
        <div class="text-block">這是一個以動物募款為主的網站，主要呈現多隻生病動物的故事，並呼籲大眾提供協助，幫助牠們獲得治療與照護，同時也提供基礎的動物疾病與照顧相關資訊。</div>

        <div class="collage-wrapper">
            <img class="g2-img-letter border-solid" src="./pict/care3.png" alt="Letter">
            <div class="g2-bottom-row">
                <img class="g2-img-goal border-solid" src="./pict/care4.png" alt="Goal">
                <img class="g2-img-btn border-solid" src="./pict/care5.png" alt="Donate">
            </div>
        </div>
        
        <div class="text-block">此頁面主要作為動物救助的捐款平台，核心內容是向捐贈者說明捐款用途與理念。</div>

        <div class="iframe-section">
            <div class="desktop-mockup">
                <div class="mockup-header"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
                <iframe src="https://tubular-naiad-bda170.netlify.app/"></iframe>
            </div>
            <div class="mobile-mockup">
                <iframe src="https://tubular-naiad-bda170.netlify.app/"></iframe>
            </div>
        </div>
    </div>

    <div id="imgModal" class="img-modal"><span class="close-img-modal">&times;</span><img class="img-modal-content" id="expandedImg"></div>

    <script>
        document.getElementById('mobileMenuBtn').addEventListener('click', () => { document.getElementById('navLinks').classList.toggle('active'); });
        const modal = document.getElementById('imgModal');
        document.querySelectorAll('.collage-wrapper img').forEach(img => {
            img.addEventListener('click', function() { modal.classList.add('show'); document.getElementById('expandedImg').src = this.src; });
        });
        document.querySelector('.close-img-modal').addEventListener('click', () => modal.classList.remove('show'));
    </script>
</body>
</html>

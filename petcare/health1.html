<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧寵物健康管理 - 1:1 還原</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 基礎設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
        }
        
        /* 鎖定整個網頁，不允許網頁本身的捲動 */
        body {
            background-color: #d1d5db; /* 網頁背景色，突顯手機外框 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; 
        }

        /* 模擬手機外框 (iPhone 14 Pro 比例，動態適應螢幕高度) */
        .phone-container {
            height: 92vh;
            max-height: 844px; /* iPhone Max 高度 */
            aspect-ratio: 390 / 844; /* 保持標準手機比例 */
            background-color: #fdf5d8; /* 原圖的淺黃色背景 */
            border-radius: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            border: 14px solid #111;
            position: relative;
            overflow: hidden; /* 確保內容不會超出手機圓角 */
        }

        /* 頂部動態島 */
        .dynamic-island {
            width: 32%;
            height: 32px;
            background-color: #000;
            border-radius: 20px;
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        /* 頂部橘色 Welcome 區塊 */
        .header-banner {
            background-color: #fcb854; /* 橘黃色 */
            padding: 70px 25px 25px 25px; /* 上方 padding 避開動態島 */
            width: 100%;
        }
        .header-banner h1 {
            color: #ffffff;
            font-size: 46px; /* 超大粗體英文 */
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1.1;
            margin-bottom: 5px;
        }
        .header-banner h2 {
            color: #ffffff;
            font-size: 22px;
            font-weight: 800;
            text-align: right; /* 文字靠右 */
            letter-spacing: 1px;
        }

        /* 中間內容區 */
        .content-area {
            padding: 25px;
            height: calc(100% - 170px - 85px); /* 扣除 Header 和 底部導覽列的高度 */
            overflow-y: hidden; /* 根據需求固定不捲動 */
        }

        /* 區塊標題 (健康中心、近期記錄) */
        .section-title {
            font-size: 24px;
            font-weight: bold;
            color: #111;
            margin-bottom: 15px;
        }

        /* 健康中心 - 四宮格 */
        .grid-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 35px;
        }
        .grid-item {
            background-color: #ffffff; /* 白色卡片 */
            border-radius: 24px;
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }
        
        /* 圖示的圓形背景 */
        .icon-circle {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            font-size: 35px;
        }
        
        /* 四種不同的圖示配色還原 */
        .bg-red    { background-color: #ffcdd2; color: #e53935; } /* 心情觀測 */
        .bg-blue   { background-color: #c6d8ff; color: #1e62ff; } /* 長期分析 */
        .bg-purple { background-color: #eed4ff; color: #9c27b0; } /* 診斷治療 */
        .bg-green  { background-color: #ccf5e9; color: #13d2a3; } /* 數位獸醫 */

        .grid-text {
            color: #111;
            font-size: 16px;
            font-weight: bold;
        }

        /* 近期記錄區塊 */
        .recent-card {
            background-color: #ffffff;
            border-radius: 28px;
            height: 120px; /* 模擬被底部導覽列蓋住一半的卡片 */
            width: 100%;
        }

        /* 底部導覽列 */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 85px;
            background-color: #fcb854; /* 與上方 Header 相同的橘黃色 */
            display: flex;
            justify-content: space-around;
            align-items: center; /* 圖示垂直置中 */
            padding-bottom: 15px; /* 稍微往上抬，為手機底部橫條留空間 */
            z-index: 50;
        }
        .nav-item {
            color: #000000;
            font-size: 34px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="dynamic-island"></div>

    <div class="header-banner">
        <h1>WELCOME</h1>
        <h2>智慧寵物健康管理</h2>
    </div>

    <div class="content-area">
        
        <div class="section-title">健康中心</div>
        
        <div class="grid-menu">
            <div class="grid-item">
                <div class="icon-circle bg-red"><i class="fa-solid fa-heart"></i></div>
                <div class="grid-text">心情觀測</div>
            </div>
            <div class="grid-item">
                <div class="icon-circle bg-blue"><i class="fa-solid fa-eye"></i></div>
                <div class="grid-text">長期分析</div>
            </div>
            <div class="grid-item">
                <div class="icon-circle bg-purple"><i class="fa-solid fa-dna"></i></div>
                <div class="grid-text">診斷治療</div>
            </div>
            <div class="grid-item">
                <div class="icon-circle bg-green"><i class="fa-solid fa-kit-medical"></i></div>
                <div class="grid-text">數位獸醫</div>
            </div>
        </div>

        <div class="section-title">近期記錄</div>
        <div class="recent-card"></div>

    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item"><i class="fa-solid fa-house"></i></a>
        <a href="#" class="nav-item"><i class="fa-solid fa-paw"></i></a>
        <a href="#" class="nav-item"><i class="fa-solid fa-user-group"></i></a>
        <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i></a>
    </div>
</div>

</body>
</html>

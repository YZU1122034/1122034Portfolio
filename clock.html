<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>讀書計時器</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html {
            scroll-behavior: smooth;
        }

        /* 導覽列變數設定 (還原原本的色彩) */
        :root {
            --nav-height: 74px;
            --accent-blue: #1275ff;
            --accent-orange: #ff8d30;
            --text-muted: #475569;
            /* 內容區塊細節專用的橘黃色變數 */
            --theme-orange: #FF9F1C; 
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: #f3f0e6;
            font-family: "Noto Sans TC", sans-serif;
            margin: 0;
            padding: var(--nav-height) 0 0 0; 
            min-height: 100vh;
            overflow-x: hidden;
            position: relative; 
        }

        /* 🌐 導覽列樣式 (完全還原原版) */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .nav-container {
            width: 100%;
            padding: 1.2rem 6vw; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1600px; 
            margin: 0 auto;
            box-sizing: border-box;
        }

        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }
        
        .nav-links a {
            font-family: 'Inter', "Noto Sans TC", sans-serif;
            text-decoration: none;
            color: var(--text-muted);
            margin-left: 2.5rem;
            font-size: 1.05rem;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .nav-links a:hover {
            color: var(--accent-blue);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        .particle-background {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
            background: #f3f0e6;
        }

        .particle-background iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* 💡 還原的返回按鈕樣式 */
        .back-btn {
            position: fixed;
            top: 100px; 
            left: 40px;
            text-decoration: none;
            color: #333;
            font-weight: 700;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .bg-visible-section {
            width: 100%;
            padding: 60px 20px;
            box-sizing: border-box;
            position: relative;
        }

        .section-inner {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            margin-bottom: 42px;
        }

        .main-phone {
            width: 250px;
        }

        .main-phone img {
            width: 100%;
            display: block;
        }

        /* 內容細節樣式 (橘黃色系) */
        .hero-title {
            color: var(--theme-orange);
            font-size: 5rem;
            font-weight: 900;
            font-family: 'Inter', sans-serif;
            line-height: 1;
            letter-spacing: 5px;
        }

        .description {
            max-width: 820px;
            margin: 0 auto;
            padding: 28px 34px 30px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.86);
            border-radius: 26px;
            box-shadow: 0 18px 36px rgba(54, 45, 31, 0.08);
            border-left: 8px solid var(--theme-orange);
            backdrop-filter: blur(8px);
        }

        .description-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--theme-orange);
            font-size: 0.95rem;
            font-weight: 900;
        }

        .description-text {
            margin: 0;
            color: #111;
            font-size: 1.25rem;
            font-weight: 900;
            line-height: 1.75;
            text-align: left;
        }

        .video-wrapper {
            max-width: 820px;
            margin: 0 auto;
            padding: 28px 34px 34px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.86);
            border-radius: 26px;
            box-shadow: 0 18px 36px rgba(54, 45, 31, 0.08);
            border-left: 8px solid var(--theme-orange);
            backdrop-filter: blur(8px);
        }

        .video-container {
            width: 100%;
            margin-top: 16px;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
        }

        .video-container video {
            width: 100%;
            height: auto;
            display: block;
            outline: none; 
        }

        /* RWD: 手機版樣式適配 */
        @media (max-width: 768px) {
            :root {
                --nav-height: 92px;
            }

            body {
                padding-top: var(--nav-height);
            }

            .nav-container {
                padding: 1.2rem 16px;
                align-items: center;
            }

            .logo {
                font-size: 1.3rem;
            }
            
            .mobile-menu-btn {
                display: block;
            }
            
            .nav-links {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(15px);
                flex-direction: column;
                align-items: center;
                padding: 0;
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
                max-height: 0;
                overflow: hidden;
                transition: max-height 0.4s ease-out;
            }
            
            .nav-links.active {
                max-height: 300px;
                padding: 1.5rem 0;
            }
            
            .nav-links a {
                margin: 0.8rem 0;
                font-size: 1.1rem;
                margin-left: 0;
            }

            /* 💡 還原的返回按鈕手機版排版 */
            .back-btn {
                top: calc(var(--nav-height) + 15px);
                left: 20px;
                padding: 8px 16px;
            }

            .bg-visible-section {
                padding: 80px 16px 40px;
            }

            .bg-visible-section:first-of-type {
                padding-top: calc(var(--nav-height) + 80px);
            }

            .hero {
                flex-direction: column;
                gap: 20px;
            }

            .hero-title {
                font-size: 3rem;
                text-align: center;
            }

            .main-phone {
                width: 190px;
            }

            .description, .video-wrapper {
                padding: 22px 24px 24px;
                border-left-width: 6px;
                border-radius: 22px;
            }

            .description-text {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <div class="particle-background">
        <iframe src="particile.html" title="particle background"></iframe>
    </div>

    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Portfolio</a>
            
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="nav-links" id="navLinks">
                <a href="index.html#about">關於我</a>
                <a href="index.html#game">遊戲設計</a>
                <a href="index.html#web">網頁設計</a>
                <a href="index.html#uiux">UI/UX 設計</a>
            </div>
        </div>
    </nav>

    <a href="index.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> 返回主頁
    </a>

    <section class="bg-visible-section">
        <div class="section-inner">
            <div class="hero">
                <div class="main-phone">
                    <img src="./pict/image 19.png" alt="讀書計時器 首頁">
                </div>
                <div class="hero-title">讀書計時器</div>
            </div>

            <div class="description">
                <div class="description-label">
                    <i class="fa-solid fa-clock"></i>
                    APP 核心概念
                </div>
                <p class="description-text">
                    本app的主旨是讓經常上班不在家，但又因為擔心寵物不在身邊，無法隨時查看狀況而開發的app。
                </p>
            </div>
        </div>
    </section>

    <section class="bg-visible-section" style="padding-top: 0;">
        <div class="section-inner">
            <div class="video-wrapper">
                <div class="description-label">
                    <i class="fa-solid fa-play"></i>
                    操作展示影片
                </div>
                <div class="video-container">
                    <video controls>
                        <source src="./video/clock.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </div>
    </section>

    <script>
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinks');

        mobileMenuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            
            const icon = mobileMenuBtn.querySelector('i');
            if (navLinks.classList.contains('active')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            } else {
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            }
        });
    </script>
</body>
</html>
